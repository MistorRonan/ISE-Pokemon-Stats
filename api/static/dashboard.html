<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokédex Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:       #0a0e1a;
    --surface:  #0f1524;
    --border:   #1e2d4a;
    --accent:   #FFCB05;
    --accent2:  #3D7DCA;
    --warn:     #f59e0b;
    --error:    #ef4444;
    --text:     #e2e8f0;
    --muted:    #6b7fa3;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 48px 1fr;
  }

  /* ── Header ── */
  header {
    grid-column: 1 / -1;
    background: linear-gradient(90deg, #0f1a30 0%, #0a0e1a 100%);
    border-bottom: 2px solid var(--accent);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 14px;
  }
  header .logo {
    font-family: var(--mono); font-weight: 600; font-size: 15px;
    color: var(--accent); letter-spacing: .08em;
    display: flex; align-items: center; gap: 8px;
  }
  header .logo .pokeball {
    width: 20px; height: 20px; border-radius: 50%;
    background: linear-gradient(180deg, #e63946 0% 50%, #f0f0f0 50% 100%);
    border: 2px solid #fff;
    position: relative; flex-shrink: 0;
    box-shadow: 0 0 8px rgba(255,203,5,.4);
  }
  header .logo .pokeball::after {
    content: ''; position: absolute;
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 6px; height: 6px; border-radius: 50%;
    background: #fff; border: 1.5px solid #333;
  }
  header .tagline { font-size: 11px; color: var(--muted); margin-left: 4px; }
  header .live-badge {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--muted);
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted); transition: background .3s;
  }
  .dot.live { background: #22c55e; box-shadow: 0 0 6px #22c55e; animation: pulse 2s infinite; }
  .dot.error { background: var(--error); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* ── Sidebar ── */
  aside {
    background: #080c18;
    border-right: 1px solid var(--border);
    padding: 20px 0 16px;
    overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .nav-logo {
    padding: 0 20px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    font-family: var(--mono); font-size: 11px;
    color: var(--muted); letter-spacing: .1em; text-transform: uppercase;
  }
  .section-label {
    font-size: 9px; font-weight: 700;
    color: var(--muted); letter-spacing: .15em; text-transform: uppercase;
    padding: 14px 20px 4px;
    opacity: 0.6;
  }
  .endpoint-btn {
    display: flex; align-items: center; gap: 12px;
    width: 100%; padding: 11px 20px;
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-family: var(--sans); font-size: 13px; font-weight: 400;
    text-align: left; transition: all .15s;
    border-left: 3px solid transparent;
    border-radius: 0;
  }
  .endpoint-btn .nav-icon { font-size: 16px; flex-shrink: 0; width: 22px; text-align: center; }
  .endpoint-btn .nav-label { flex: 1; }
  .endpoint-btn:hover { background: rgba(255,203,5,.04); color: var(--text); }
  .endpoint-btn.active {
    background: rgba(255,203,5,.08);
    border-left-color: var(--accent);
    color: var(--accent);
    font-weight: 500;
  }
  .method-tag { display: none; }

  .nav-spacer { flex: 1; }
  .nav-settings {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }
  .nav-settings-label {
    font-size: 10px; color: var(--muted); letter-spacing: .08em;
    text-transform: uppercase; margin-bottom: 6px;
  }

  /* ── Main ── */
  main { padding: 0; overflow-y: auto; display: flex; flex-direction: column; }

  /* Page header */
  .page-header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0d1527 0%, var(--bg) 100%);
  }
  .page-title {
    font-family: var(--sans); font-size: 22px; font-weight: 600;
    color: var(--text); margin-bottom: 4px;
    display: flex; align-items: center; gap: 10px;
  }
  .page-title .page-icon { font-size: 24px; }
  .page-subtitle { font-size: 13px; color: var(--muted); }

  /* Search/filter bar */
  .search-bar {
    padding: 16px 32px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center;
  }
  .search-input {
    flex: 1;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 14px;
    color: var(--text); font-family: var(--sans); font-size: 13px;
    outline: none; transition: border-color .15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-select {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 14px;
    color: var(--text); font-family: var(--sans); font-size: 13px;
    outline: none; cursor: pointer; transition: border-color .15s;
  }
  .search-select:focus { border-color: var(--accent); }

  /* Page content */
  .page-content { padding: 24px 32px; flex: 1; }

  /* Old panel styles - kept for compatibility */
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .panel-title { font-size: 13px; font-weight: 600; }
  .panel-desc  { font-size: 12px; color: var(--muted); margin-left: auto; }
  .panel-body  { padding: 16px; }

  /* Params - now hidden in clean bar above */
  .params-grid { display: none; }
  .param-row { display: grid; grid-template-columns: 140px 1fr; align-items: center; gap: 8px; }
  .param-label { font-size: 11px; color: var(--muted); }
  .param-input {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px;
    color: var(--text); font-family: var(--sans); font-size: 13px;
    outline: none; transition: border-color .15s; width: 100%;
  }
  .param-input:focus { border-color: var(--accent); }
  .param-hint { font-size: 11px; color: var(--muted); grid-column: 2; margin-top: -4px; }
  .run-btn { display: none; }

  /* Response area */
  .response-panel { margin-top: 16px; }
  .response-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: var(--bg); border: 1px solid var(--border); border-bottom: none;
    border-radius: 4px 4px 0 0;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
  }
  .status-ok   { color: var(--accent2); font-weight: 600; }
  .status-err  { color: var(--error); font-weight: 600; }
  .response-url { margin-left: auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 400px; }
  .response-body {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 0 0 4px 4px; padding: 12px;
    font-family: var(--mono); font-size: 12px; line-height: 1.6;
    max-height: 420px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
  }

  /* SSE panel */
  .sse-controls { display: flex; gap: 10px; align-items: center; }
  .stop-btn {
    padding: 8px 16px; border: 1px solid var(--error);
    background: rgba(239,68,68,.1); color: var(--error);
    border-radius: 4px; cursor: pointer;
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    display: none;
  }
  .stop-btn.visible { display: inline-block; }
  .sse-log {
    margin-top: 12px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 12px;
    font-family: var(--mono); font-size: 12px; line-height: 1.7;
    height: 360px; overflow-y: auto;
  }
  .log-entry { display: flex; gap: 8px; padding: 2px 0; }
  .log-ts    { color: var(--muted); flex-shrink: 0; }
  .log-type  { flex-shrink: 0; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
  .log-metrics   { background: rgba(59,130,246,.15); color: var(--accent); }
  .log-heartbeat { background: rgba(100,116,139,.15); color: var(--muted); }
  .log-error     { background: rgba(239,68,68,.15); color: var(--error); }
  .log-connect   { background: rgba(16,185,129,.15); color: var(--accent2); }
  .log-data  { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

  .empty-state { color: var(--muted); font-size: 12px; font-style: italic; }

  /* ── PC Info chart ── */
  .pc-dashboard {
    margin-top: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .pc-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
  }
  .pc-card-title {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: .1em;
    margin-bottom: 12px;
  }
  .pc-gauge-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 8px;
  }
  .pc-gauge-label {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    width: 120px; flex-shrink: 0;
  }
  .pc-gauge-track {
    flex: 1; height: 10px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 5px; overflow: hidden;
  }
  .pc-gauge-fill {
    height: 100%; border-radius: 5px;
    transition: width .7s cubic-bezier(.4,0,.2,1);
  }
  .pc-gauge-val {
    font-family: var(--mono); font-size: 11px;
    color: var(--text); min-width: 44px; text-align: right;
  }
  .pc-stat-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .pc-stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 8px 10px;
  }
  .pc-stat-label {
    font-family: var(--mono); font-size: 10px; color: var(--muted);
    margin-bottom: 2px;
  }
  .pc-stat-value {
    font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--text);
  }
  .pc-stat-unit {
    font-size: 10px; color: var(--muted); margin-left: 2px;
  }
  .pc-ring-row {
    display: flex; align-items: center; justify-content: space-around;
    padding: 4px 0 8px;
  }
  .pc-ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .pc-ring-label { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .pc-ring {
    position: relative; width: 72px; height: 72px;
  }
  .pc-ring svg { transform: rotate(-90deg); }
  .pc-ring-track { fill: none; stroke: var(--border); stroke-width: 7; }
  .pc-ring-fill  { fill: none; stroke-width: 7; stroke-linecap: round;
    transition: stroke-dashoffset .8s cubic-bezier(.4,0,.2,1); }
  .pc-ring-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text);
  }

  /* JSON colours */
  .json-key     { color: #FFCB05; }
  .json-str     { color: #86efac; }
  .json-num     { color: #fde68a; }
  .json-bool    { color: #f9a8d4; }
  .json-null    { color: var(--muted); }


    .pc-dashboard {
    margin-top: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .pc-section {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
  }
  .pc-section-title {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    color: var(--muted); letter-spacing: .1em; text-transform: uppercase;
    margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
  }
  .pc-section-title .pc-icon { font-size: 13px; }
  /* Gauge */
  .pc-gauge-wrap { display: flex; flex-direction: column; gap: 10px; }
  .pc-gauge-row { display: flex; flex-direction: column; gap: 4px; }
  .pc-gauge-label {
    display: flex; justify-content: space-between;
    font-family: var(--mono); font-size: 11px;
  }
  .pc-gauge-name { color: var(--muted); }
  .pc-gauge-val  { color: var(--text); font-weight: 500; }
  .pc-gauge-track {
    height: 10px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 5px; overflow: hidden;
  }
  .pc-gauge-fill {
    height: 100%; border-radius: 5px;
    transition: width .7s cubic-bezier(.4,0,.2,1);
  }
  .fill-ok      { background: linear-gradient(90deg, #10b981, #34d399); }
  .fill-warn    { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
  .fill-danger  { background: linear-gradient(90deg, #ef4444, #f87171); }
  /* Stat grid */
  .pc-stat-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .pc-stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 8px 10px;
  }
  .pc-stat-label { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 3px; }
  .pc-stat-value { font-family: var(--mono); font-size: 16px; font-weight: 600; color: var(--text); }
  .pc-stat-unit  { font-size: 11px; color: var(--muted); font-weight: 400; }

  /* ── Pokémon chart ── */
    .poke-chart-wrap {
      margin-top: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
    }
    .poke-chart-title {
      font-family: var(--mono); font-size: 11px; color: var(--muted);
      margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }
    .poke-chart-title strong { color: var(--text); font-size: 13px; }
    .poke-chart-wrap { --sprite-size: 56px; }
    .poke-row {
      display: grid;
      grid-template-columns: calc(var(--sprite-size) + 8px) 130px 1fr 48px;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      animation: fadeIn .3s ease both;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
    .poke-row img {
      width: var(--sprite-size); height: var(--sprite-size);
      image-rendering: pixelated;
      filter: drop-shadow(0 0 4px rgba(0,0,0,.5));
      transition: width .15s, height .15s;
    }
    .poke-sprite-placeholder {
      width: var(--sprite-size); height: var(--sprite-size);
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .sprite-scale-control {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--mono); font-size: 11px; color: var(--muted);
    }
    .sprite-scale-control input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 90px; height: 4px;
      background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
    }
    .sprite-scale-control input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
    }
    .sprite-scale-val { min-width: 28px; color: var(--text); }
    .poke-name-cell {
      display: flex; flex-direction: column; justify-content: center; gap: 3px;
      min-width: 0;
    }
    .poke-name {
      font-family: var(--mono); font-size: 12px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .poke-types { display: flex; gap: 3px; flex-wrap: wrap; }
    .poke-type-badge {
      font-family: var(--mono); font-size: 9px; font-weight: 600;
      padding: 1px 5px; border-radius: 3px;
      text-transform: uppercase; letter-spacing: .04em;
      box-shadow: 0 0 0 1px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.15);
    }
    .poke-bar-track {
      background: var(--surface);
      border-radius: 3px; height: 14px; overflow: hidden;
      border: 1px solid var(--border);
    }
    .poke-bar-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, #FFCB05 0%, #ffe566 100%);
      transition: width .6s cubic-bezier(.4,0,.2,1);
    }
    .poke-count {
      font-family: var(--mono); font-size: 11px;
      color: var(--muted); text-align: right;
    }
    .poke-tabs {
      display: flex; gap: 4px; margin-bottom: 12px;
    }
    .poke-tab {
      padding: 4px 12px; border-radius: 4px; border: 1px solid var(--border);
      background: none; color: var(--muted); font-family: var(--mono); font-size: 11px;
      cursor: pointer; transition: all .15s;
    }
    .poke-tab.active { background: rgba(59,130,246,.15); border-color: var(--accent); color: var(--accent); }
    .poke-show-more {
      margin-top: 10px; width: 100%; padding: 7px;
      background: none; border: 1px dashed var(--border);
      color: var(--muted); font-family: var(--mono); font-size: 11px;
      border-radius: 4px; cursor: pointer; transition: border-color .15s;
    }
    .poke-show-more:hover { border-color: var(--accent); color: var(--accent); }
  
    /* ── JSON dropdown ── */
    .json-dropdown { margin-top: 16px; }
    .json-dropdown-summary {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px; cursor: pointer;
      font-family: var(--mono); font-size: 11px; color: var(--muted);
      list-style: none; user-select: none;
      transition: color .15s, border-color .15s;
    }
    .json-dropdown-summary::-webkit-details-marker { display: none; }
    .json-dropdown-summary:hover { color: var(--text); border-color: var(--accent); }
    .json-dropdown[open] .json-dropdown-summary {
      border-radius: 4px 4px 0 0;
      border-bottom-color: transparent;
      color: var(--text);
    }
    .json-dropdown[open] .response-panel { margin-top: 0; }
  
    /* ── PC Info chart ── */

  /* ── Trainer party ── */
  .trainer-dashboard { margin-top: 0; display: flex; flex-direction: column; gap: 14px; }
  .trainer-header {
    display: flex; align-items: center; gap: 12px;
    font-family: var(--sans); font-size: 15px; font-weight: 600;
  }
  .trainer-name { color: var(--text); }
  .trainer-count { color: var(--muted); font-size: 11px; font-weight: 400; }
  .gen-section {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
  }
  .gen-title {
    padding: 8px 14px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    color: var(--muted); letter-spacing: .06em; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .gen-title .gen-count {
    margin-left: auto; background: rgba(255,203,5,.15);
    color: var(--accent); padding: 1px 7px; border-radius: 10px; font-size: 10px;
  }
  .party-grid {
    display: flex; flex-wrap: wrap; gap: 10px; padding: 12px 14px;
  }
  .party-mon {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    width: 72px; animation: fadeIn .25s ease both;
  }
  .party-mon img {
    width: 56px; height: 56px; image-rendering: pixelated;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.5));
  }
  .party-mon-name {
    font-family: var(--mono); font-size: 10px; color: var(--text);
    text-align: center; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; width: 100%;
  }
  .party-mon-types { display: flex; gap: 2px; justify-content: center; flex-wrap: wrap; }

  /* Trainers list */
  .trainers-list { margin-top: 16px; display: flex; flex-direction: column; gap: 6px; }
  .trainer-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    font-family: var(--sans); font-size: 13px; cursor: pointer;
    transition: border-color .2s, background .2s, transform .1s;
  }
  .trainer-item:active { transform: scale(0.99); }
  .trainer-item:hover { border-color: var(--accent); background: rgba(255,203,5,.05); border-radius: 8px; }
  .trainer-item-icon { font-size: 16px; }
  .trainer-item-name { color: var(--text); }
  .trainer-item-hint { margin-left: auto; font-size: 10px; color: var(--muted); }


  /* ── PC bar rows (matching poke/trainer style) ── */
  .pc-bar-section-label {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    color: var(--muted); letter-spacing: .1em; text-transform: uppercase;
    margin-bottom: 8px; margin-top: 4px;
  }
  .pc-bar-row {
    display: grid;
    grid-template-columns: 20px 120px 1fr 120px;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .pc-bar-icon  { font-size: 13px; text-align: center; }
  .pc-bar-label { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .pc-bar-val   { font-family: var(--mono); font-size: 11px; color: var(--text); text-align: right; }
  .pc-bar-unit  { color: var(--muted); font-size: 10px; }


  /* ── Formats browser ── */
  .formats-wrap { margin-top: 0; display: flex; flex-direction: column; gap: 12px; }
  .formats-toolbar {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .formats-search {
    flex: 1; min-width: 160px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 6px 10px; outline: none;
  }
  .formats-search:focus { border-color: var(--accent); }
  .formats-filter-btn {
    background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
    color: var(--muted); font-family: var(--mono); font-size: 11px;
    padding: 5px 10px; cursor: pointer; transition: all .15s;
    white-space: nowrap;
  }
  .formats-filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,.08); }
  .formats-grid {
    display: flex; flex-direction: column; gap: 4px;
    max-height: 520px; overflow-y: auto;
  }
  .format-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    font-family: var(--sans); font-size: 13px;
    transition: border-color .15s, background .15s;
  }
  .format-item:hover { border-color: var(--accent); }
  .format-item.pinned { border-color: #10b981; background: rgba(16,185,129,.04); }
  .format-name { flex: 1; color: var(--text); cursor: pointer; }
  .format-name:hover { color: var(--accent); }
  .pin-badge {
    font-size: 10px; padding: 2px 7px; border-radius: 10px;
    background: rgba(16,185,129,.15); color: #10b981;
    font-weight: 600; letter-spacing: .04em;
  }
  .pin-btn {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    color: var(--muted); font-family: var(--mono); font-size: 10px;
    padding: 3px 8px; cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .pin-btn:hover { border-color: #10b981; color: #10b981; }
  .pin-btn.pinned { border-color: #ef4444; color: #ef4444; }
  .pin-btn.pinned:hover { background: rgba(239,68,68,.08); }
  .formats-count { font-family: var(--mono); font-size: 11px; color: var(--muted); }

</style>
</head>
<body>

<header>
  <span class="logo">
    <div class="pokeball"></div>
    POKÉDEX
  </span>
  <span class="tagline">Live Dashboard</span>
  <div class="live-badge">
    <div class="dot" id="sseDot"></div>
    <span id="sseStatus" style="font-size:11px;color:var(--muted);">Live</span>
  </div>
</header>

<aside>
  <div class="section-label">Overview</div>
  <button class="endpoint-btn active" onclick="selectEndpoint('pc_devices')" id="btn-pc_devices">
    <span class="nav-icon">🖥️</span><span class="nav-label">PC Devices</span>
  </button>
  <button class="endpoint-btn" onclick="selectEndpoint('pc_device_info')" id="btn-pc_device_info">
    <span class="nav-icon">📊</span><span class="nav-label">Device Details</span>
  </button>

  <div class="section-label">Pokémon</div>
  <button class="endpoint-btn" onclick="selectEndpoint('pokemon_info')" id="btn-pokemon_info">
    <span class="nav-icon">⚔️</span><span class="nav-label">Pokémon Stats</span>
  </button>
  <button class="endpoint-btn" onclick="selectEndpoint('formats')" id="btn-formats">
    <span class="nav-icon">🏆</span><span class="nav-label">Battle Formats</span>
  </button>

  <div class="section-label">Trainers</div>
  <button class="endpoint-btn" onclick="selectEndpoint('trainers')" id="btn-trainers">
    <span class="nav-icon">🧢</span><span class="nav-label">All Trainers</span>
  </button>
  <button class="endpoint-btn" onclick="selectEndpoint('trainer_info')" id="btn-trainer_info">
    <span class="nav-icon">🎒</span><span class="nav-label">Trainer Party</span>
  </button>

  <div class="nav-spacer"></div>
  <div class="nav-settings">
    <div class="nav-settings-label">Server</div>
    <input class="param-input" id="baseUrl" value="http://localhost:5002" style="width:100%;" oninput="saveBaseUrl()" />
  </div>
</aside>

<main id="main">
  <!-- injected by JS -->
</main>

<script>

const BASE_URL_KEY = 'readapi_base_url';
const endpointEl = document.getElementById('main');
let activeEndpoint = 'pc_devices';
let sseSource = null;

/* ── Silent background poller ── */
const POLL_INTERVAL_MS = 15000;
let _pollTimer = null;

function _startPoller() {
  _stopPoller();
  const ep = endpoints[activeEndpoint];
  // Don't poll SSE endpoints or ones that require user input to build a valid URL
  if (!ep || ep.sse) return;
  _pollTimer = setInterval(() => {
    const current = endpoints[activeEndpoint];
    if (!current || current.sse) return;
    try {
      current.build(); // dry-run to check params are valid — throws if required fields missing
      runRequest();
    } catch (_) {
      // Required param not filled in yet — skip silently
    }
  }, POLL_INTERVAL_MS);
}

function _stopPoller() {
  if (_pollTimer !== null) {
    clearInterval(_pollTimer);
    _pollTimer = null;
  }
}

function saveBaseUrl() {
  localStorage.setItem(BASE_URL_KEY, document.getElementById('baseUrl').value);
  _pingServer();
}
function getBase() {
  return document.getElementById('baseUrl').value.replace(/\/$/, '');
}

/* ── Endpoint definitions ── */
const endpoints = {
  hello: {
    title: '/hello',
    desc: 'Health check',
    params: [],
    build: () => `${getBase()}/hello`,
  },
  devices: {
    title: '/devices',
    desc: 'List devices for an aggregator',
    params: [
      { id: 'dev_agg_guid', label: 'aggregator_guid', placeholder: 'required', hint: 'GUID of the parent aggregator' },
      { id: 'dev_name',     label: 'name',             placeholder: 'optional', hint: 'Filter by device name' },
    ],
    build: () => {
      const g = v('dev_agg_guid'), n = v('dev_name');
      let url = `${getBase()}/devices?aggregator_guid=${encodeURIComponent(g)}`;
      if (n) url += `&name=${encodeURIComponent(n)}`;
      return url;
    },
  },
  metrics: {
    title: '/metrics',
    desc: 'Query stored metric values with optional filters',
    params: [
      { id: 'm_guid',    label: 'guid',         placeholder: 'optional' },
      { id: 'm_device',  label: 'device_name',  placeholder: 'optional' },
      { id: 'm_min',     label: 'utc_date_min', placeholder: '2024-01-01 00:00:00', hint: 'Format: YYYY-MM-DD HH:MM:SS' },
      { id: 'm_max',     label: 'utc_date_max', placeholder: '2024-12-31 23:59:59', hint: 'Format: YYYY-MM-DD HH:MM:SS' },
    ],
    build: () => {
      const params = [];
      if (v('m_guid'))   params.push(`guid=${encodeURIComponent(v('m_guid'))}`);
      if (v('m_device')) params.push(`device_name=${encodeURIComponent(v('m_device'))}`);
      if (v('m_min'))    params.push(`utc_date_min=${encodeURIComponent(v('m_min'))}`);
      if (v('m_max'))    params.push(`utc_date_max=${encodeURIComponent(v('m_max'))}`);
      return `${getBase()}/metrics` + (params.length ? '?' + params.join('&') : '');
    },
  },
  pc_devices: {
    title: 'PC Devices',
    icon: '🖥️',
    desc: 'List all registered PC devices',
    params: [],
    build: () => `${getBase()}/pc_devices`,
  },
  pc_device_info: {
    title: 'Device Details',
    icon: '📊',
    desc: 'Latest hardware snapshot for a specific machine',
    params: [
      { id: 'pcd_device', label: 'device', placeholder: 'e.g. Betty_III', hint: 'Device hostname' },
    ],
    build: () => {
      const d = v('pcd_device');
      if (!d) throw new Error('device is required');
      return `${getBase()}/pc_device_info?device=${encodeURIComponent(d)}`;
    },
  },
  pokemon_info: {
    title: 'Pokémon Stats',
    icon: '⚔️',
    desc: 'Usage & move counts from recent Showdown replays',
    params: [
      { id: 'pk_format', label: 'format', placeholder: 'gen9ou',  hint: 'e.g. gen9ou, gen9uu, gen9randombattle' },
      { id: 'pk_type', label: 'type', select: ['mons', 'move'] },
    ],
    build: () => {
      const f = v('pk_format') || 'gen9ou', t = v('pk_type') || 'mons';
      return `${getBase()}/pokemon_info?format=${encodeURIComponent(f)}&type=${encodeURIComponent(t)}`;
    },
  },
  trainers: {
    title: 'All Trainers',
    icon: '🧢',
    desc: 'All registered trainers in the mobile app',
    params: [],
    build: () => `${getBase()}/trainers`,
  },
  trainer_info: {
    title: 'Trainer Party',
    icon: '🎒',
    desc: "A trainer's current party grouped by generation",
    params: [
      { id: 'ti_trainer', label: 'trainer', placeholder: 'e.g. DavidM', hint: 'Trainer username' },
    ],
    build: () => {
      const t = v('ti_trainer');
      if (!t) throw new Error('trainer is required');
      return `${getBase()}/trainer_info?trainer=${encodeURIComponent(t)}`;
    },
  },
  formats: {
    title: 'Battle Formats',
    icon: '🏆',
    desc: 'Browse and pin Showdown formats for tracking',
    params: [],
    build: () => `${getBase()}/formats`,
    custom: true,  // rendered by renderFormats(), not runRequest()
  },
  stream: {
    title: '/stream',
    desc: 'Server-Sent Events — live push on every ingest commit',
    sse: true,
  },
};

function v(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

/* ── Routing ── */
function selectEndpoint(name) {
  activeEndpoint = name;
  document.querySelectorAll('.endpoint-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + name).classList.add('active');
  render();
  _startPoller();
  // Auto-fire request after render — skip SSE and endpoints with required params not yet filled
  const ep = endpoints[name];
  if (!ep || ep.sse) return;
  setTimeout(() => {
    try {
      ep.build(); // dry-run: throws if required params are missing
      runRequest();
    } catch (_) {
      // Required param not filled in yet — wait for user input
    }
  }, 50);
}

function render() {
  const ep = endpoints[activeEndpoint];
  endpointEl.innerHTML = ep.sse ? renderSSEPanel(ep) : renderRestPanel(ep);
}

/* ── REST panel ── */
function renderRestPanel(ep) {
  const searchBar = ep.params.length ? `
    <div class="search-bar">
      ${ep.params.map(p => `
        ${p.select
          ? `<select class="search-select" id="${p.id}" onchange="runRequest()">${p.select.map(o => `<option value="${o}">${o}</option>`).join('')}</select>`
          : `<input class="search-input" id="${p.id}" placeholder="${p.placeholder || p.label}" onkeydown="if(event.key==='Enter') runRequest()" />`
        }
      `).join('')}
    </div>` : '';

  return `
    <div class="page-header">
      <div class="page-title">
        <span class="page-icon">${ep.icon || '📋'}</span>
        ${ep.title}
      </div>
      <div class="page-subtitle">${ep.desc}</div>
    </div>
    ${searchBar}
    <div class="page-content">
      <div id="responseArea"></div>
    </div>`;
}

async function runRequest() {
  const ep = endpoints[activeEndpoint];

  let url;
  try { url = ep.build(); } catch(e) {
    showResponse(null, null, e.message); return;
  }

  const t0 = performance.now();
  try {
    const res = await fetch(url);
    const ms  = Math.round(performance.now() - t0);
    const json = await res.json();
    const isPoke      = activeEndpoint === 'pokemon_info'  && res.ok && json.data;
    const isPcDevice  = activeEndpoint === 'pc_device_info' && res.ok && json.data;
    const isPcDevices = activeEndpoint === 'pc_devices'     && res.ok && json.devices;
    const isTrainer   = activeEndpoint === 'trainer_info'   && res.ok && json.party;
    const isTrainers  = activeEndpoint === 'trainers'       && res.ok && json.trainers;
    const isFormats   = activeEndpoint === 'formats'        && res.ok && json.available;
    if (isPoke) {
      renderPokeChart(json.data, json.type || v('pk_type') || 'mons');
      showResponse(res.status, url, json, ms, true);
    } else if (isPcDevice) {
      renderPcChart(json.data, json.device);
      showResponse(res.status, url, json, ms, true);
    } else if (isPcDevices) {
      renderPcDevicesList(json.devices);
      showResponse(res.status, url, json, ms, true);
    } else if (isTrainer) {
      renderTrainerParty(json.trainer, json.party);
      showResponse(res.status, url, json, ms, true);
    } else if (isTrainers) {
      renderTrainersList(json.trainers);
      showResponse(res.status, url, json, ms, true);
    } else if (isFormats) {
      renderFormats(json.pinned, json.available);
      showResponse(res.status, url, json, ms, true);
    } else {
      showResponse(res.status, url, json, ms, false);
    }
  } catch(e) {
    const area = document.getElementById('responseArea');
    if (area) area.innerHTML = `<div style="color:var(--error);font-family:var(--mono);font-size:12px;padding:16px 0;">⚠ Could not connect to server — make sure it's running on ${getBase()}</div>`;
  }
}

function showResponse(status, url, data, ms, asDropdown = false) {
  const area = document.getElementById('responseArea');
  const ok = status && status < 400;

  const inner = `<div class="response-body">${syntaxHighlight(data)}</div>`;

  if (asDropdown) {
    // Rich view already rendered above — show JSON as subtle collapsible
    area.innerHTML = `<details class="json-dropdown" style="margin-top:8px;">
      <summary class="json-dropdown-summary">&#9654; Raw JSON</summary>
      <div class="response-panel" style="margin-top:0;border-radius:0 0 4px 4px;">${inner}</div>
    </details>`;
  } else {
    area.innerHTML = `<div class="response-panel">${inner}</div>`;
  }
}

/* ── SSE panel ── */
function renderSSEPanel(ep) {
  return `
    <div class="panel">
      <div class="panel-header">
        <span class="method-tag sse-tag">SSE</span>
        <span class="panel-title">${ep.title}</span>
        <span class="panel-desc">${ep.desc}</span>
      </div>
      <div class="panel-body">
        <div class="sse-controls">
          <button class="run-btn" id="sseStartBtn" onclick="startSSE()">▶ Connect</button>
          <button class="stop-btn" id="sseStopBtn" onclick="stopSSE()">■ Disconnect</button>
        </div>
        <div class="sse-log" id="sseLog"><span class="empty-state">Not connected. Click Connect to open the SSE stream.</span></div>
      </div>
    </div>`;
}

function startSSE() {
  if (sseSource) stopSSE();
  _stopPoller();
  _stopPoller();
  const url = `${getBase()}/stream`;
  sseSource = new EventSource(url);

  setSseStatus('connecting');
  logSSE('connect', `Connecting to ${url}`, 'log-connect');

  sseSource.onopen = () => {
    setSseStatus('live');
    logSSE('connect', 'Stream opened', 'log-connect');
  };

  sseSource.addEventListener('metrics', e => {
    const data = JSON.parse(e.data);
    const aggs = data.aggregators || [];
    const summary = `${aggs.length} aggregator(s)` + (aggs[0] ? ` — ${aggs[0].name || aggs[0].guid}` : '');
    logSSE('metrics', summary, 'log-metrics');
  });

  sseSource.addEventListener('heartbeat', () => {
    logSSE('heartbeat', 'keepalive', 'log-heartbeat');
  });

  sseSource.addEventListener('error', e => {
    logSSE('error', e.data || 'stream error', 'log-error');
  });

  sseSource.onerror = () => {
    setSseStatus('error');
    logSSE('error', 'Connection lost or refused', 'log-error');
  };

  document.getElementById('sseStopBtn').classList.add('visible');
}

function stopSSE() {
  if (sseSource) { sseSource.close(); sseSource = null; }
  setSseStatus('off');
  logSSE('connect', 'Disconnected', 'log-connect');
  const stopBtn = document.getElementById('sseStopBtn');
  if (stopBtn) stopBtn.classList.remove('visible');
}

function setSseStatus(state) {
  // kept for SSE compatibility but server health dot is driven by _pingServer()
}

/* ── Server health ping ── */
function _setServerHealth(online) {
  const dot = document.getElementById('sseDot');
  const txt = document.getElementById('sseStatus');
  dot.className = 'dot';
  if (online) {
    dot.classList.add('live');
    txt.textContent = 'Live';
    txt.style.color = '#22c55e';
  } else {
    // blank / grey when offline
    txt.textContent = 'Offline';
    txt.style.color = 'var(--muted)';
  }
}

async function _pingServer() {
  try {
    const res = await fetch(`${getBase()}/hello`, { signal: AbortSignal.timeout(4000) });
    _setServerHealth(res.ok);
  } catch (_) {
    _setServerHealth(false);
  }
}

function logSSE(type, message, cls) {
  const log = document.getElementById('sseLog');
  if (!log) return;
  const wasEmpty = log.querySelector('.empty-state');
  if (wasEmpty) log.innerHTML = '';

  const ts = new Date().toLocaleTimeString('en-GB', { hour12: false });
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-ts">${ts}</span><span class="log-type ${cls}">${type}</span><span class="log-data">${escHtml(message)}</span>`;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

/* ── PC Info chart ── */
function fillClass(pct) {
  if (pct >= 85) return 'fill-danger';
  if (pct >= 60) return 'fill-warn';
  return 'fill-ok';
}

function gauge(label, pct, detail) {
  const cls = fillClass(pct);
  return `
    <div class="pc-gauge-row">
      <div class="pc-gauge-label">
        <span class="pc-gauge-name">${label}</span>
        <span class="pc-gauge-val">${pct}%${detail ? ' <span style="color:var(--muted);font-weight:400;">— ' + detail + '</span>' : ''}</span>
      </div>
      <div class="pc-gauge-track">
        <div class="pc-gauge-fill ${cls}" style="width:${pct}%"></div>
      </div>
    </div>`;
}

function stat(label, value, unit) {
  return `
    <div class="pc-stat">
      <div class="pc-stat-label">${label}</div>
      <div class="pc-stat-value">${value}<span class="pc-stat-unit"> ${unit}</span></div>
    </div>`;
}

/* ── PC devices list ── */
function renderPcDevicesList(devices) {
  const existing = document.getElementById('pcDevicesWrap');
  if (existing) existing.remove();

  const wrap = document.createElement('div');
  wrap.id = 'pcDevicesWrap';
  wrap.innerHTML = `
    <div class="trainers-list">
      ${devices.map(d => `
        <div class="trainer-item" onclick="loadPcDevice('${escHtml(d)}')">
          <span class="trainer-item-icon">🖥</span>
          <span class="trainer-item-name">${escHtml(d)}</span>
          <span class="trainer-item-hint">click to view snapshot →</span>
        </div>`).join('')}
    </div>`;
  document.getElementById('responseArea').parentNode.insertBefore(wrap, document.getElementById('responseArea'));
}

async function loadPcDevice(name) {
  selectEndpoint('pc_device_info');
  await new Promise(r => setTimeout(r, 50));
  const input = document.getElementById('pcd_device');
  if (input) input.value = name;
  runRequest();
}

function renderPcChart(data, deviceName) {
  const existing = document.getElementById('pcDashboard');
  if (existing) existing.remove();

  const area = document.getElementById('responseArea');
  const wrap = document.createElement('div');
  wrap.id = 'pcDashboard';
  wrap.style.marginTop = '0';

  if (data.error) {
    wrap.innerHTML = `<div class="poke-chart-wrap" style="color:var(--error);font-family:var(--mono);font-size:12px;">⚠ ${data.error}</div>`;
    area.parentNode.insertBefore(wrap, area);
    return;
  }

  const diskFree  = data['disk-free-gb']          ?? '?';
  const diskTotal = data['disk-total-gb']          ?? '?';
  const diskUsage = data['disk-usage']             ?? 0;
  const netSent   = data['net-total-sent-mb']      ?? '?';
  const netRecv   = data['net-total-recv-mb']      ?? '?';
  const procs     = data['system-process-count']   ?? '?';
  const threads   = data['system-thread-count']    ?? '?';
  const users     = data['users-logged-in']        ?? '?';
  const bootEpoch = data['boot-time-epoch'];
  const bootStr   = bootEpoch ? new Date(bootEpoch * 1000).toLocaleString() : '—';

  // Helper: bar row matching poke-chart style
  const maxVal = Math.max(diskUsage, netSent, netRecv, procs, threads);
  function barRow(icon, label, value, unit, pct, colorClass) {
    return `
      <div class="pc-bar-row">
        <span class="pc-bar-icon">${icon}</span>
        <span class="pc-bar-label">${label}</span>
        <div class="poke-bar-track" style="flex:1;">
          <div class="poke-bar-fill ${colorClass}" style="width:${Math.max(2,pct)}%;background:${colorClass};"></div>
        </div>
        <span class="pc-bar-val">${value}<span class="pc-bar-unit"> ${unit}</span></span>
      </div>`;
  }

  function pcGaugeRow(icon, label, pct, detail) {
    const col = pct >= 85 ? '#ef4444' : pct >= 60 ? '#f59e0b' : '#10b981';
    return `
      <div class="pc-bar-row">
        <span class="pc-bar-icon">${icon}</span>
        <span class="pc-bar-label">${label}</span>
        <div class="poke-bar-track" style="flex:1;">
          <div class="poke-bar-fill" style="width:${Math.max(2,pct)}%;background:linear-gradient(90deg,${col},${col}cc);"></div>
        </div>
        <span class="pc-bar-val">${pct}%<span class="pc-bar-unit"> ${detail ? '— ' + detail : ''}</span></span>
      </div>`;
  }

  const netMax  = Math.max(netSent, netRecv, 1);
  const procMax = Math.max(procs, threads, 1);

  wrap.innerHTML = `
    <div class="poke-chart-wrap">
      <div class="poke-chart-title">
        <strong>${escHtml(deviceName || 'PC Device')}</strong>
        <span>live hardware snapshot</span>
      </div>

      <div class="pc-bar-section-label">💾 Disk</div>
      ${pcGaugeRow('', 'Usage', diskUsage, `${diskFree} GB free of ${diskTotal} GB`)}

      <div class="pc-bar-section-label" style="margin-top:14px;">🌐 Network <span style="font-size:9px;color:var(--muted);">since boot</span></div>
      <div class="pc-bar-row">

        <span class="pc-bar-val">${netRecv}<span class="pc-bar-unit"> MB</span></span>

      <div class="pc-bar-section-label" style="margin-top:14px;">🔧 Processes</div>

        </div>
        <span class="pc-bar-val">${procs}<span class="pc-bar-unit"></span></span>
      </div>
      <div class="pc-bar-row">
        <span class="pc-bar-icon">🧵</span>
        <span class="pc-bar-label">Threads</span>

        </div>
        <span class="pc-bar-val">${threads}<span class="pc-bar-unit"></span></span>

        <span class="pc-bar-label">Boot time</span>

}

/* ── Pokémon chart ── */
let pokeAllData = [];
let pokeVisible = 20;
let pokeDataType = 'mons';

// Cache so we don't re-fetch the same slug twice
const pokeCache = {};

const TYPE_COLORS = {
  normal:   { bg: '#A8A878', text: '#fff' },
  fire:     { bg: '#F08030', text: '#fff' },
  water:    { bg: '#6890F0', text: '#fff' },
  electric: { bg: '#F8D030', text: '#333' },
  grass:    { bg: '#78C850', text: '#fff' },
  ice:      { bg: '#98D8D8', text: '#333' },
  fighting: { bg: '#C03028', text: '#fff' },
  poison:   { bg: '#A040A0', text: '#fff' },
  ground:   { bg: '#E0C068', text: '#333' },
  flying:   { bg: '#A890F0', text: '#fff' },
  psychic:  { bg: '#F85888', text: '#fff' },
  bug:      { bg: '#A8B820', text: '#fff' },
  rock:     { bg: '#B8A038', text: '#fff' },
  ghost:    { bg: '#705898', text: '#fff' },
  dragon:   { bg: '#7038F8', text: '#fff' },
  dark:     { bg: '#705848', text: '#fff' },
  steel:    { bg: '#B8B8D0', text: '#333' },
  fairy:    { bg: '#EE99AC', text: '#333' },
};

function typeTag(t) {
  const c = TYPE_COLORS[t] || { bg: '#888', text: '#fff' };
  return `<span class="poke-type-badge" style="background:${c.bg};color:${c.text};">${t}</span>`;
}

function pokeSlug(name) {
  return name.toLowerCase()
    .replace(/\s+/g, '-')
    .replace(/[.''\`:']/g, '')
    .replace(/\u2019/g, '')
    .replace(/\u2018/g, '')
    .replace(/♀/g, '-f')
    .replace(/♂/g, '-m')
    .replace(/-(mega|alola|galar|hisui|paldea|origin|sky|land|heat|wash|frost|fan|mow|therian|black|white|resolute|pirouette|blade|shield|unbound|complete|dusk|dawn|midnight|midday|school|disguised|busted|original|zen|standard|hangry|full-belly|crowned|hero|single-strike|rapid-strike|ice-rider|shadow-rider|roaming|incarnate|primal|ultra|eternamax|starter|10|50).*$/, '')
    .replace(/-+$/, '');
}

async function fetchPokeData(name) {
  const slug = pokeSlug(name);
  if (pokeCache[slug] !== undefined) return pokeCache[slug];
  try {
    const res  = await fetch(`https://pokeapi.co/api/v2/pokemon/${slug}`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const result = {
      sprite: data.sprites?.front_default || '',
      types:  data.types.map(t => t.type.name),
    };
    pokeCache[slug] = result;
    return result;
  } catch {
    pokeCache[slug] = { sprite: '', types: [] };
    return pokeCache[slug];
  }
}
function renderPokeChart(data, type) {
  pokeDataType = type;
  pokeAllData  = Object.entries(data).sort((a,b) => b[1]-a[1]);
  pokeVisible  = 20;

  // Remove old chart if present
  const existing = document.getElementById('pokeChartWrap');
  if (existing) existing.remove();

  const area = document.getElementById('responseArea');
  const wrap = document.createElement('div');
  wrap.id = 'pokeChartWrap';
  wrap.className = 'poke-chart-wrap';
  wrap.innerHTML = `
    <div class="poke-chart-title">
      <strong>${pokeAllData.length} ${type === 'move' ? 'moves' : 'Pokémon'}</strong>
      <span>from recent replays — sorted by usage</span>
      <div class="sprite-scale-control" style="margin-left:auto;">
        <span>sprite size</span>
        <input type="range" min="32" max="96" value="56" step="4" id="spriteSlider" oninput="updateSpriteSize(this.value)" />
        <span class="sprite-scale-val" id="spriteSizeVal">56px</span>
      </div>
    </div>
    <div id="pokeRows"></div>
    <button class="poke-show-more" id="pokeMore" onclick="pokeShowMore()">Show more…</button>`;

  // Insert chart BEFORE the response area
  area.parentNode.insertBefore(wrap, area);

  drawPokeRows();
}

function drawPokeRows() {
  const container = document.getElementById('pokeRows');
  const moreBtn   = document.getElementById('pokeMore');
  const slice     = pokeAllData.slice(0, pokeVisible);
  const maxVal    = pokeAllData[0]?.[1] || 1;

  container.innerHTML = '';
  slice.forEach(([name, count], i) => {
    const pct  = Math.max(2, Math.round((count / maxVal) * 100));
    const row  = document.createElement('div');
    row.className = 'poke-row';
    row.style.animationDelay = `${Math.min(i,10) * 20}ms`;

    const isMove = pokeDataType === 'move';
    const imgHtml = isMove
      ? `<div class="poke-sprite-placeholder">⚡</div>`
      : `<img id="sprite-${i}" src="" alt="${escHtml(name)}" title="${escHtml(name)}"
             style="opacity:0;transition:opacity .2s;" />`;

    row.innerHTML = `
      ${imgHtml}
      <div class="poke-name-cell">
        <span class="poke-name" title="${escHtml(name)}">${escHtml(name)}</span>
        <div class="poke-types" id="types-${i}"></div>
      </div>
      <div class="poke-bar-track"><div class="poke-bar-fill" style="width:${pct}%"></div></div>
      <span class="poke-count">${count}</span>`;
    container.appendChild(row);

    // async load sprite + types
    if (!isMove) {
      fetchPokeData(name).then(({ sprite, types }) => {
        const img = document.getElementById(`sprite-${i}`);
        if (img) { img.src = sprite || 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png'; img.style.opacity = '1'; }
        const typesEl = document.getElementById(`types-${i}`);
        if (typesEl && types.length) typesEl.innerHTML = types.map(typeTag).join('');
      });
    }
  });

  if (pokeVisible >= pokeAllData.length) {
    moreBtn.style.display = 'none';
  } else {
    moreBtn.style.display = 'block';
    moreBtn.textContent = `Show more… (${pokeAllData.length - pokeVisible} remaining)`;
  }
}

function updateSpriteSize(val) {
  const wrap = document.getElementById('pokeChartWrap');
  if (wrap) wrap.style.setProperty('--sprite-size', val + 'px');
  const label = document.getElementById('spriteSizeVal');
  if (label) label.textContent = val + 'px';
}

function pokeShowMore() {
  pokeVisible += 20;
  drawPokeRows();
}


/* ── Trainer party ── */
function renderTrainersList(trainers) {
  const existing = document.getElementById('trainersWrap');
  if (existing) existing.remove();

  const wrap = document.createElement('div');
  wrap.id = 'trainersWrap';
  wrap.innerHTML = `
    <div class="trainers-list">
      ${trainers.map(t => `
        <div class="trainer-item" onclick="loadTrainer('${escHtml(t)}')">
          <span class="trainer-item-icon">🧢</span>
          <span class="trainer-item-name">${escHtml(t)}</span>
          <span class="trainer-item-hint">click to view party →</span>
        </div>`).join('')}
    </div>`;
  document.getElementById('responseArea').parentNode.insertBefore(wrap, document.getElementById('responseArea'));
}

async function loadTrainer(name) {
  // Switch to trainer_info endpoint and auto-run for this trainer
  selectEndpoint('trainer_info');
  await new Promise(r => setTimeout(r, 50)); // let render settle
  const input = document.getElementById('ti_trainer');
  if (input) input.value = name;
  runRequest();
}

function renderTrainerParty(trainerName, party) {
  const existing = document.getElementById('trainerPartyWrap');
  if (existing) existing.remove();

  const totalMons = Object.values(party).reduce((sum, mons) => sum + mons.length, 0);
  const wrap = document.createElement('div');
  wrap.id = 'trainerPartyWrap';

  const genSections = Object.entries(party).map(([gen, mons]) => `
    <div class="gen-section">
      <div class="gen-title">
        ${escHtml(gen)}
        <span class="gen-count">${mons.length}</span>
      </div>
      <div class="party-grid" id="grid-${escHtml(gen).replace(/\s+/g,'-')}">
        ${mons.map((mon, i) => `
          <div class="party-mon" id="pmon-${escHtml(gen).replace(/\s+/g,'-')}-${i}">
            <img id="pmon-img-${escHtml(gen).replace(/\s+/g,'-')}-${i}" src="" alt="${escHtml(mon)}" title="${escHtml(mon)}" style="opacity:0;transition:opacity .2s;" />
            <div class="party-mon-types" id="pmon-types-${escHtml(gen).replace(/\s+/g,'-')}-${i}"></div>
            <span class="party-mon-name">${escHtml(mon)}</span>
          </div>`).join('')}
      </div>
    </div>`).join('');

  wrap.innerHTML = `
    <div class="trainer-dashboard">
      <div class="trainer-header">
        <span class="trainer-name">🧢 ${escHtml(trainerName)}</span>
        <span class="trainer-count">${totalMons} Pokémon across ${Object.keys(party).length} game(s)</span>
      </div>
      ${genSections}
    </div>`;

  document.getElementById('responseArea').parentNode.insertBefore(wrap, document.getElementById('responseArea'));

  // Async load sprites + types per mon
  Object.entries(party).forEach(([gen, mons]) => {
    const genKey = escHtml(gen).replace(/\s+/g, '-');
    mons.forEach((mon, i) => {
      fetchPokeData(mon).then(({ sprite, types }) => {
        const img = document.getElementById(`pmon-img-${genKey}-${i}`);
        if (img) { img.src = sprite || ''; img.style.opacity = '1'; }
        const typesEl = document.getElementById(`pmon-types-${genKey}-${i}`);
        if (typesEl && types.length) typesEl.innerHTML = types.map(typeTag).join('');
      });
    });
  });
}


/* ── Formats browser ── */
let _pinnedFormats  = [];
let _allFormats     = [];
let _formatsFilter  = 'all';   // 'all' | 'pinned'
let _formatsSearch  = '';

function renderFormats(pinned, available) {
  _pinnedFormats = pinned  || [];
  _allFormats    = available || [];

  const existing = document.getElementById('formatsWrap');
  if (existing) existing.remove();

  const wrap = document.createElement('div');
  wrap.id = 'formatsWrap';
  wrap.innerHTML = `
    <div class="formats-wrap">
      <div class="formats-toolbar">
        <input class="formats-search" id="fmtSearch" placeholder="Search formats…"
               oninput="_formatsSearch=this.value; _drawFormats()" />
        <button class="formats-filter-btn active" id="flt-all"
                onclick="_setFormatFilter('all')">All</button>
        <button class="formats-filter-btn" id="flt-pinned"
                onclick="_setFormatFilter('pinned')">📌 Pinned</button>
        <span class="formats-count" id="fmtCount"></span>
      </div>
      <div class="formats-grid" id="formatsGrid"></div>
    </div>`;

  document.getElementById('responseArea').parentNode.insertBefore(
    wrap, document.getElementById('responseArea')
  );
  _drawFormats();
}

function _setFormatFilter(f) {
  _formatsFilter = f;
  document.querySelectorAll('.formats-filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('flt-' + f).classList.add('active');
  _drawFormats();
}

function _drawFormats() {
  const grid = document.getElementById('formatsGrid');
  const count = document.getElementById('fmtCount');
  if (!grid) return;

  let list = _allFormats;
  if (_formatsFilter === 'pinned') list = list.filter(f => _pinnedFormats.includes(f));
  if (_formatsSearch) list = list.filter(f => f.toLowerCase().includes(_formatsSearch.toLowerCase()));

  count.textContent = `${list.length} format${list.length !== 1 ? 's' : ''}`;

  grid.innerHTML = list.map(fmt => {
    const isPinned = _pinnedFormats.includes(fmt);
    return `
      <div class="format-item ${isPinned ? 'pinned' : ''}" id="fmt-row-${escHtml(fmt)}">
        <span class="format-name" onclick="loadFormat('${escHtml(fmt)}')" title="View data">${escHtml(fmt)}</span>
        ${isPinned ? '<span class="pin-badge">TRACKED</span>' : ''}
        <button class="pin-btn ${isPinned ? 'pinned' : ''}"
                onclick="togglePin('${escHtml(fmt)}', ${isPinned})">
          ${isPinned ? '✕ Unpin' : '📌 Pin'}
        </button>
      </div>`;
  }).join('');
}

async function togglePin(fmt, isPinned) {
  const method = isPinned ? 'DELETE' : 'POST';
  try {
    const res  = await fetch(`${getBase()}/formats/pin?format=${encodeURIComponent(fmt)}`, { method });
    const json = await res.json();
    if (json.status === 'success') {
      _pinnedFormats = json.pinned;
      _drawFormats();
    } else {
      alert(`Error: ${json.message}`);
    }
  } catch(e) {
    alert(`Request failed: ${e.message}`);
  }
}

function loadFormat(fmt) {
  // Switch to pokemon_info, fill format, run
  selectEndpoint('pokemon_info');
  setTimeout(() => {
    const input = document.getElementById('pk_format');
    if (input) input.value = fmt;
    runRequest();
  }, 50);
}

/* ── Syntax highlight ── */
function syntaxHighlight(obj) {
  const json = typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2);
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
    if (/^"/.test(match)) {
      if (/:$/.test(match)) return `<span class="json-key">${match}</span>`;
      return `<span class="json-str">${match}</span>`;
    }
    if (/true|false/.test(match)) return `<span class="json-bool">${match}</span>`;
    if (/null/.test(match)) return `<span class="json-null">${match}</span>`;
    return `<span class="json-num">${match}</span>`;
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Init ── */
const saved = localStorage.getItem(BASE_URL_KEY);
if (saved) document.getElementById('baseUrl').value = saved;
render();
_startPoller();
_pingServer();
setInterval(_pingServer, 15000);
